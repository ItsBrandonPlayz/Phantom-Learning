<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phantom Learning</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%234f46e5' rx='6'/><text x='16' y='22' font-size='18' text-anchor='middle' fill='white' font-family='system-ui,sans-serif' font-weight='bold'>P</text></svg>" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="signin-page">
    <div class="fx-stage" aria-hidden="true">
      <canvas id="fx-canvas" class="fx-canvas"></canvas>
      <div class="fx-beam"></div>
      <div class="fx-aurora"></div>
      <div class="fx-grid"></div>
      <div class="fx-vignette"></div>
      <div class="fx-noise"></div>
    </div>
    <div class="bg-gradient"></div>

    <div class="signin-canvas">
      <div class="signin-glow signin-glow-a" aria-hidden="true"></div>
      <div class="signin-glow signin-glow-b" aria-hidden="true"></div>
      <div class="signin-layout">
        <div class="signin-hero">
          <div class="signin-hero-orb" aria-hidden="true"></div>
          <div class="signin-hero-copy">
            <p class="signin-kicker">Phantom Learning</p>
            <h1 class="title title-phantom signin-title">Welcome back</h1>
            <p class="signin-brand-tagline">Sign in with your account to unlock the site.</p>
          </div>
        </div>
        <div class="signin-panel">
          <div class="signin-panel-inner">
            <div id="loading" class="loading-state" role="status" aria-live="polite" style="display:block">
              <div class="signin-loading-text">Loading…</div>
            </div>

            <div id="error" class="error-state" style="display:none;">
              <div class="error-title">Oops!</div>
              <div class="error-message">Something went wrong</div>
              <div id="error-details" class="error-sub-message"></div>
            </div>

            <div id="app" class="signin-card" style="display:none">
              <div id="logged-out" class="action-card">
                <p class="action-text">Sign in to unlock the site.</p>
                <button id="login-btn" class="button login">Log in</button>
              </div>

              <div id="logged-in" class="logged-in-section" style="display: none;">
                <div class="logged-in-message">✅ Successfully authenticated!</div>
                <h2 class="profile-section-title">Your Profile</h2>
                <div id="profile" class="profile-card"></div>
                <button id="logout-btn" class="button logout">Log out</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      (function () {
        var base = window.location.pathname.replace(/\/[^/]*$/, "") || "/";
        if (base !== "/" && base.charAt(base.length - 1) !== "/") base += "/";
        window.AUTH0_CONFIG = {
          domain: "dev-5xgwbdwfur1baw4x.us.auth0.com",
          clientID: "IaVvwHcgfhHnoesP5pETuBl40XIm96Wj",
          redirectUri: "https://cmd-afk.github.io/Phantom-Learning/redirect.html",
          responseType: "token id_token",
          scope: "openid profile email"
        };
      })();
    </script>
    <script defer src="https://cdn.auth0.com/js/auth0/9.22/auth0.min.js"></script>
    <script defer src="site-fx.js"></script>
    <script defer src="auth0-app.js"></script>
  </body>
</html>
